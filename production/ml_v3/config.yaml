# Updated 2026-03-22

model:
  seed: 6
  model_dir: "C:\\ai-research-team\\v10_ml_v3\\seed_6"
  n_features: 45
  current_model_year: 2026  # falls back to 2025 if not available

exits:
  stop_pct: 0.0216        # 2.16% stop (realistic MOC fills)
  max_hold_days: 3
  default_hold_days: 3
  score_exit_floor: 0.54
